<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>João Cenerelli | About Me / Sobre Mim</title>

    <link rel="icon" href="Imagens/gato-preto.png" type="image/png" />
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>

  <body>
    <main class="cute-page">
      <img class="cat" src="Imagens/cat.gif" alt="Gif de gato" />

      <button class="cute-button" onclick="tocarAudio()">
        Tocar áudio surpresa
      </button>

      <audio id="audio-surpresa" loop>
        <source src="Audio/yippeeeeeeeeeeeeee.mp3" type="audio/mpeg" />
        Seu navegador não suporta áudio.
      </audio>
    </main>

    <script>
      function tocarAudio() {
        const audio = document.getElementById("audio-surpresa");
        audio.play();
      }
    </script>
  </body>
</html>
